<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="circleBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#c85a00"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="16" cy="16" r="16" fill="url(#circleBg)"/>
  <circle cx="16" cy="16" r="16" fill="url(#shine)"/>

  <!-- Mango body (white/cream) -->
  <path
    d="M16 26.5
       C11.2 26.5 7.5 23 7.5 18.5
       C7.5 13 11 10 16 10
       C21 10 24.5 13 24.5 18.5
       C24.5 23 20.8 26.5 16 26.5Z"
    fill="rgba(255,255,255,0.92)"
  />

  <!-- Stem -->
  <line x1="16" y1="10.5" x2="16" y2="8.5"
    stroke="rgba(255,255,255,0.7)"
    stroke-width="1.4"
    stroke-linecap="round"
  />

  <!-- Leaf -->
  <path
    d="M16 9
       C15.6 7.2 17 5 20 5.5
       C20.3 8 18.5 10 16 9Z"
    fill="#2e7d32"
  />

  <!-- Leaf vein -->
  <path
    d="M16 9 C17.5 7.5 19.2 6.2 20 5.5"
    stroke="#388e3c"
    stroke-width="0.4"
    stroke-linecap="round"
    opacity="0.7"
  />
</svg>
