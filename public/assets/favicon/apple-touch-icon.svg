<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#fdecd7"/>
    </linearGradient>
    <linearGradient id="mangoBody" x1="30" y1="50" x2="150" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f9a825"/>
      <stop offset="55%" stop-color="#f78616"/>
      <stop offset="100%" stop-color="#c85a00"/>
    </linearGradient>
    <linearGradient id="leaf" x1="80" y1="0" x2="140" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b6d24"/>
    </linearGradient>
    <radialGradient id="highlight" cx="38%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>

  <!-- Mango body -->
  <path
    d="M90 168
       C52 168 26 144 26 110
       C26 68 52 42 90 42
       C128 42 154 68 154 110
       C154 144 128 168 90 168Z"
    fill="url(#mangoBody)"
  />

  <!-- Highlight -->
  <path
    d="M90 168
       C52 168 26 144 26 110
       C26 68 52 42 90 42
       C128 42 154 68 154 110
       C154 144 128 168 90 168Z"
    fill="url(#highlight)"
  />

  <!-- Stem -->
  <path
    d="M90 44 C91 34 89 27 90 22"
    stroke="#7b3a00"
    stroke-width="7"
    stroke-linecap="round"
  />

  <!-- Leaf -->
  <path
    d="M90 26
       C87 16 94 2 118 4
       C120 20 110 32 90 26Z"
    fill="url(#leaf)"
  />

  <!-- Leaf vein -->
  <path
    d="M90 26 C100 18 112 10 118 4"
    stroke="#388e3c"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.6"
  />
</svg>
