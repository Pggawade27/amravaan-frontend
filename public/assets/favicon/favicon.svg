<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="mangoBody" x1="6" y1="8" x2="26" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f9a825"/>
      <stop offset="55%" stop-color="#f78616"/>
      <stop offset="100%" stop-color="#c85a00"/>
    </linearGradient>
    <linearGradient id="leaf" x1="14" y1="0" x2="22" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b6d24"/>
    </linearGradient>
    <radialGradient id="highlight" cx="38%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Mango body – organic teardrop shape -->
  <path
    d="M16 29
       C9.5 29 4.5 24 4.5 18
       C4.5 11.5 9 7.5 16 7.5
       C23 7.5 27.5 11.5 27.5 18
       C27.5 24 22.5 29 16 29Z"
    fill="url(#mangoBody)"
  />

  <!-- Highlight sheen -->
  <path
    d="M16 29
       C9.5 29 4.5 24 4.5 18
       C4.5 11.5 9 7.5 16 7.5
       C23 7.5 27.5 11.5 27.5 18
       C27.5 24 22.5 29 16 29Z"
    fill="url(#highlight)"
  />

  <!-- Stem -->
  <path
    d="M16 8 C16.2 6.5 15.8 5.2 16 4.5"
    stroke="#7b3a00"
    stroke-width="1.8"
    stroke-linecap="round"
  />

  <!-- Leaf -->
  <path
    d="M16 5
       C15.5 3.5 17 0.5 21 1
       C21.5 4 19.5 6.5 16 5Z"
    fill="url(#leaf)"
  />

  <!-- Leaf vein -->
  <path
    d="M16 5 C17.5 3.5 19.5 2 21 1"
    stroke="#388e3c"
    stroke-width="0.5"
    stroke-linecap="round"
    opacity="0.6"
  />
</svg>
